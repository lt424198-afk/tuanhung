<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">

<title>StudyHub</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>📚 StudyHub</h1>

<nav>

<a class="home" href="index.html">Trang chủ</a>
<a href="pages/notes.html">Ghi chú</a>
<a href="pages/quiz.html">Quiz</a>
<a href="pages/flashcard.html">Flashcard</a>
<a href="pages/schedule.html">Thời khóa biểu</a>

</nav>

<button onclick="toggleMode()">🌙</button>

</header>

<section class="dashboard">

<div class="card">

<h2>📌 Bài tập cần làm</h2>

<input id="taskInput" placeholder="Nhập bài tập">

<button onclick="addTask()">Thêm</button>

<ul id="taskList"></ul>

</div>

<div class="card">

<h2>⏱ Pomodoro</h2>

<div id="timer">25:00</div>

<button onclick="startTimer()">Start</button>

<button onclick="resetTimer()">Reset</button>

</div>

<div class="card">

<h2>📊 Tiến độ học</h2>

<input id="progressInput" placeholder="Nhập %">

<button onclick="updateProgress()">Cập nhật</button>

<div class="bar">

<div id="progress"></div>

</div>

</div>

<div class="card">

<h2>🧮 Máy tính</h2>

<input id="calc" placeholder="Ví dụ 5+5">

<button onclick="calculate()">=</button>

<p id="result"></p>

</div>

</section>

<script src="app.js"></script>

</body>

</html>
