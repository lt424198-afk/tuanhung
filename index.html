<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<title>Study Dashboard</title>

<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="sidebar">

<h2>Study</h2>

<ul>

<li onclick="openPage('dashboard')">Dashboard</li>
<li onclick="openPage('tasks')">Tasks</li>
<li onclick="openPage('timer')">Timer</li>
<li onclick="openPage('calendar')">Calendar</li>

</ul>

</div>

<div class="main">

<header>

<h1>Dashboard</h1>

<button id="darkToggle">🌙</button>

</header>

<section id="dashboard">

<div class="grid">

<div class="card">
<h2 id="taskCount">0</h2>
<p>Tasks</p>
</div>

<div class="card">
<h2 id="doneCount">0</h2>
<p>Completed</p>
</div>

<div class="card">
<h2 id="studyTime">0</h2>
<p>Study Minutes</p>
</div>

</div>

<canvas id="chart"></canvas>

</section>

</div>

<script src="js/app.js"></script>

</body>

</html>
