<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">

<title>StudyHub</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>📚 StudyHub</h1>

<nav>

<a href="index.html">Trang chủ</a>

<a href="pages/notes.html">Ghi chú</a>

<a href="pages/quiz.html">Quiz</a>

<a href="pages/flashcard.html">Flashcard</a>

<a href="pages/schedule.html">Thời khóa biểu</a>

</nav>

<button onclick="toggleMode()">🌙</button>

</header>

<main>

<div class="grid">

<div class="card">

<h2>📌 Bài tập</h2>

<input id="taskInput">

<button onclick="addTask()">Thêm</button>

<ul id="taskList"></ul>

</div>

<div class="card">

<h2>⏱ Pomodoro</h2>

<div id="timer">25:00</div>

<button onclick="startTimer()">Start</button>

<button onclick="resetTimer()">Reset</button>

</div>

<div class="card">

<h2>📊 Tiến độ</h2>

<input id="progressInput">

<button onclick="updateProgress()">Cập nhật</button>

<div class="progressBar">

<div id="progress"></div>

</div>

</div>

<div class="card">

<h2>🧮 Máy tính</h2>

<input id="calc">

<button onclick="calculate()">=</button>

<p id="result"></p>

</div>

</div>

</main>

<script src="script.js"></script>

</body>

</html>
