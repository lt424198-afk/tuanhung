<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<title>StudyVerse</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/dashboard.css">
<link rel="stylesheet" href="css/todo.css">
<link rel="stylesheet" href="css/animation.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<nav class="navbar">

<div class="logo">
StudyVerse
</div>

<ul class="menu">

<li onclick="showPage('dashboard')">Dashboard</li>
<li onclick="showPage('todo')">Tasks</li>
<li onclick="showPage('calendar')">Calendar</li>
<li onclick="showPage('timer')">Pomodoro</li>

</ul>

<button id="darkBtn">🌙</button>

</nav>


<section id="dashboard" class="page">

<h1>Dashboard</h1>

<div class="cards">

<div class="card glass">
<h2 id="taskCount">0</h2>
<p>Bài tập</p>
</div>

<div class="card glass">
<h2 id="doneCount">0</h2>
<p>Hoàn thành</p>
</div>

<div class="card glass">
<h2 id="studyTime">0</h2>
<p>Phút học</p>
</div>

</div>

<div class="chartBox">
<canvas id="chart"></canvas>
</div>

</section>


<section id="todo" class="page hidden">

<h1>Todo List</h1>

<div class="todoBox">

<input id="taskInput" placeholder="Nhập bài tập">

<button onclick="addTask()">Add</button>

</div>

<ul id="taskList"></ul>

</section>


<section id="timer" class="page hidden">

<h1>Pomodoro Timer</h1>

<div class="timer">

<div class="circle">

<h2 id="time">25:00</h2>

</div>

<div class="timerBtn">

<button onclick="startTimer()">Start</button>
<button onclick="resetTimer()">Reset</button>

</div>

</div>

</section>


<script src="js/app.js"></script>
<script src="js/todo.js"></script>
<script src="js/timer.js"></script>

</body>

</html>
