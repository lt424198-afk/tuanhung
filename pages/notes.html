<!DOCTYPE html>

<html>

<head>

<link rel="stylesheet" href="../style.css">

</head>

<body>

<h1>Ghi chú học tập</h1>

<textarea id="note" style="width:100%;height:200px"></textarea>

<button onclick="saveNote()">Lưu</button>

<script>

function saveNote(){

localStorage.setItem("note",document.getElementById("note").value)

}

document.getElementById("note").value=localStorage.getItem("note")||""

</script>

</body>

</html>
